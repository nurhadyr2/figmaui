<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AquaTrack — Monitoring Prototype (25 Screens)</title>
<style>
  :root{
    --bg:#0b1220;--panel:#0f172a;--ink:#e2e8f0;--muted:#94a3b8;
    --blue:#0ea5e9;--blue2:#0284c7;--teal:#14b8a6;--aqua:#22d3ee;
    --green:#10b981;--red:#ef4444;--amber:#f59e0b;
    --card:#ffffff;--soft:#f1f5f9;--line:#e2e8f0;--text:#0f172a;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,Roboto,sans-serif}
  html,body{margin:0;background:radial-gradient(1200px 800px at 20% 0%,#1e293b,#0b1220 60%);color:var(--ink);min-height:100vh}

  header.topbar{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(11,18,32,.75);border-bottom:1px solid #1e293b;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{margin:0;font-size:16px;letter-spacing:.3px}
  header .pill{font-size:12px;color:var(--muted);padding:4px 10px;border:1px solid #1e293b;border-radius:999px}
  header .spacer{flex:1}
  header select,header button{background:#111827;color:var(--ink);border:1px solid #1e293b;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer}
  header button.primary{background:linear-gradient(135deg,var(--blue),var(--teal));border:none;color:#fff;font-weight:600}

  .workspace{padding:24px;display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:start}
  aside.sidebar{position:sticky;top:74px;background:var(--panel);border:1px solid #1e293b;border-radius:14px;padding:14px;max-height:calc(100vh - 100px);overflow:auto}
  aside h3{margin:4px 0 10px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  aside .nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#cbd5e1;margin-bottom:2px}
  aside .nav-item:hover{background:#111827}
  aside .nav-item.active{background:linear-gradient(135deg,rgba(14,165,233,.18),rgba(20,184,166,.18));color:#fff}
  aside .num{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;font-size:11px;border-radius:6px;background:#1e293b;color:var(--muted)}

  main.canvas{display:flex;flex-direction:column;gap:32px}
  .frame-row{display:flex;gap:48px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
  .frame-label{font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px}

  .iphone{position:relative;width:390px;height:844px;border-radius:54px;background:#000;padding:14px;box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 2px #1f2937,0 0 0 4px #0a0f1c}
  .iphone.ip17{width:402px;height:874px;border-radius:58px;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 2px #334155,0 0 0 4px #0a0f1c}
  .island{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#000;border-radius:20px;z-index:5}
  .ip17 .island{width:96px;height:30px;top:20px;border-radius:18px}
  .screen{width:100%;height:100%;border-radius:42px;overflow:hidden;background:var(--card);color:var(--text);position:relative;display:flex;flex-direction:column}
  .ip17 .screen{border-radius:46px}

  .statusbar{height:54px;flex:0 0 54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:13px;font-weight:600}
  .statusbar svg{width:16px;height:11px}
  .statusbar .icons{display:flex;gap:5px;align-items:center}

  .content{flex:1;overflow:auto;padding:8px 18px 0}
  .content.dk{background:linear-gradient(170deg,#071528 0%,#0c2040 50%,#071a32);color:#fff}
  .content.wh{background:#f8fafc;color:#0f172a}
  .content.am{background:linear-gradient(160deg,#fef3c7,#fde68a 60%);color:#0f172a}

  .home-indicator{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;width:134px;height:5px;border-radius:3px;background:rgba(15,23,42,.45)}

  /* TAB BAR */
  .tab-bar{flex:0 0 auto;display:flex;border-top:1px solid #e2e8f0;padding:6px 0 10px;background:#fff}
  .tab-bar.tb-dk{background:#071528;border-top-color:#1e293b}
  .tb{flex:1;text-align:center;cursor:pointer;padding:2px 0}
  .tb-i{font-size:21px;line-height:1.2}
  .tb-l{font-size:10px;color:#94a3b8;margin-top:1px}
  .tb.on .tb-l{color:#0ea5e9;font-weight:600}
  .tb-bar.tb-dk .tb-l{color:#334155}

  /* BACK BUTTON */
  .bk{position:absolute;top:60px;left:18px;width:34px;height:34px;border-radius:11px;background:rgba(15,23,42,.07);border:none;color:#0f172a;font-size:19px;cursor:pointer;z-index:6;display:flex;align-items:center;justify-content:center;line-height:1}
  .bk.bk-w{background:rgba(255,255,255,.18);color:#fff}

  /* CARDS */
  .cw{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px;margin-bottom:10px}
  .cb{background:#f0f9ff;border:1px solid #bae6fd;border-radius:14px;padding:14px;margin-bottom:10px}
  .cg{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;padding:14px;margin-bottom:10px}
  .cr{background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:14px;margin-bottom:10px}
  .cgl{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px;margin-bottom:10px;color:#fff}

  /* STATS ROW */
  .sr{display:flex;gap:8px;margin:10px 0}
  .sc{flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:13px;padding:11px 8px;text-align:center}
  .sc.sc-dk{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
  .sv{font-size:19px;font-weight:700;color:#0f172a;line-height:1.1}
  .sv.w{color:#fff}
  .su{font-size:10px;color:#94a3b8;margin-top:3px}
  .su.w{color:rgba(255,255,255,.6)}

  /* LIVE BADGE */
  @keyframes dp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}
  .ld{width:9px;height:9px;border-radius:50%;display:inline-block;animation:dp 1.5s ease-in-out infinite;vertical-align:middle;margin-right:4px}
  .ld.grn{background:#10b981}
  .ld.gry{background:#64748b;animation:none}
  .lb{display:inline-flex;align-items:center;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:600}
  .lb.on{background:rgba(16,185,129,.2);color:#10b981;border:1px solid rgba(16,185,129,.3)}
  .lb.off{background:rgba(100,116,139,.12);color:#94a3b8;border:1px solid rgba(100,116,139,.2)}

  /* PROGRESS */
  .pb{height:8px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.15);margin:6px 0}
  .pb.pb-s{background:#e2e8f0}
  .pf{height:100%;border-radius:4px;background:linear-gradient(90deg,#0ea5e9,#14b8a6)}

  /* ROOM ROW */
  .rr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07)}
  .rr.rr-s{border-bottom-color:#f0f4f8}
  .ri{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .ri.dk{background:rgba(255,255,255,.1)}
  .ri.lt{background:#e0f2fe}

  /* TIMELINE */
  .tl{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f0f4f8}
  .tl-dot{width:8px;height:8px;border-radius:50%;background:#0ea5e9;margin-top:4px;flex-shrink:0}
  .tl-time{font-size:12px;color:#0ea5e9;font-weight:600;width:42px;flex-shrink:0;margin-top:1px}
  .tl-bd{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:#e0f2fe;color:#0284c7;flex-shrink:0;align-self:center}

  /* FILTER CHIPS */
  .fc{display:inline-flex;align-items:center;padding:8px 14px;border-radius:999px;border:1.5px solid #e2e8f0;font-size:13px;cursor:pointer;background:#fff;color:#0f172a;margin:4px}
  .fc.fs{background:#0ea5e9;color:#fff;border-color:#0ea5e9}

  /* TOGGLE */
  .tg{width:46px;height:26px;border-radius:13px;background:#cbd5e1;position:relative;cursor:pointer;flex-shrink:0;transition:.2s}
  .tg.on{background:#0ea5e9}
  .tg::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
  .tg.on::after{left:23px}

  /* ALERT */
  .ah{background:linear-gradient(135deg,#ef4444,#b91c1c);padding:20px 18px 18px;color:#fff;text-align:center}

  /* SECTION TITLE */
  .st{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;font-weight:600}

  /* BTN */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:14px;font-weight:600;font-size:15px;cursor:pointer;border:none;margin-top:8px}
  .bp{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff}
  .bg{background:transparent;color:#0284c7;border:1.5px solid #bae6fd}
  .bw{background:#fff;color:#0c4a6e;border:1px solid #e0f2fe}

  @media(max-width:1100px){.workspace{grid-template-columns:1fr}aside.sidebar{position:static;max-height:none}}
</style>
</head>
<body>

<header class="topbar">
  <h1>💧 AquaTrack — Monitoring Prototype</h1>
  <span class="pill" id="screenPill">Screen 1 / 25</span>
  <div class="spacer"></div>
  <button id="prevBtn">← Prev</button>
  <button id="nextBtn" class="primary">Next →</button>
</header>

<div class="workspace">
  <aside class="sidebar">
    <h3>Screens (25)</h3>
    <div id="navList"></div>
  </aside>
  <main class="canvas">
    <div class="frame-row">
      <div>
        <div class="frame-label">iPhone 16 — 390 × 844</div>
        <div class="iphone ip16">
          <div class="island"></div>
          <div id="screen16" class="screen"></div>
          <div class="home-indicator"></div>
        </div>
      </div>
      <div>
        <div class="frame-label">iPhone 17 — 402 × 874</div>
        <div class="iphone ip17">
          <div class="island"></div>
          <div id="screen17" class="screen"></div>
          <div class="home-indicator"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const SCREENS = [
  {key:'mon1',   name:'Monitoring — Air Mengalir'},
  {key:'mon2',   name:'Monitoring — Air Berhenti'},
  {key:'flowDetail', name:'Live Flow Meter Detail'},
  {key:'roomBreak',  name:'Breakdown per Ruangan'},
  {key:'roomBath1',  name:'Detail Kamar Mandi Utama'},
  {key:'roomBath2',  name:'Detail Kamar Mandi Kedua'},
  {key:'roomKitchen',name:'Detail Dapur'},
  {key:'roomSink',   name:'Detail Wastafel Dapur'},
  {key:'roomWash',   name:'Detail Mesin Cuci'},
  {key:'roomGarden', name:'Detail Taman'},
  {key:'roomToilet', name:'Detail Toilet'},
  {key:'roomTap',    name:'Detail Keran Luar Rumah'},
  {key:'chart24',    name:'Grafik Pemakaian 24 Jam'},
  {key:'chartTap',   name:'Grafik — Tap Jam Tertentu'},
  {key:'heatmap',    name:'Heat Map Jam Puncak'},
  {key:'costRT',     name:'Estimasi Biaya Real-time'},
  {key:'costDetail', name:'Detail Estimasi Biaya'},
  {key:'histHour',   name:'Riwayat Pemakaian per Jam'},
  {key:'histDay',    name:'Riwayat Pemakaian per Hari'},
  {key:'filterRoom', name:'Filter per Ruangan'},
  {key:'filterTime', name:'Filter per Waktu'},
  {key:'compare',    name:'Bandingkan Antar Ruangan'},
  {key:'notifSet',   name:'Set Notifikasi Berlebih'},
  {key:'notifAlert', name:'Notifikasi Melebihi Batas'},
  {key:'noActivity', name:'Tidak Ada Aktivitas Air'},
];

/* ─── helpers ─── */
const SBL = `<div class="statusbar" style="color:#0f172a"><span>9:41</span><div class="icons"><span style="font-size:11px">●●●</span><svg viewBox="0 0 20 12" fill="currentColor"><rect x="0" y="3" width="3" height="6" rx="1"/><rect x="5" y="1" width="3" height="10" rx="1"/></svg><svg viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="20" height="10" rx="2.5"/><rect x="3" y="3" width="14" height="6" rx="1" fill="currentColor"/></svg></div></div>`;
const SBD = `<div class="statusbar" style="color:rgba(255,255,255,.9)"><span>9:41</span><div class="icons"><span style="font-size:11px">●●●</span><svg viewBox="0 0 20 12" fill="currentColor"><rect x="0" y="3" width="3" height="6" rx="1"/><rect x="5" y="1" width="3" height="10" rx="1"/></svg><svg viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="20" height="10" rx="2.5"/><rect x="3" y="3" width="14" height="6" rx="1" fill="currentColor"/></svg></div></div>`;

function TB(active, dark) {
  const tabs = [
    {i:'🏠',l:'Beranda',k:'home',g:'mon1'},
    {i:'💧',l:'Monitor',k:'monitor',g:'mon1'},
    {i:'📊',l:'Grafik',k:'chart',g:'chart24'},
    {i:'💰',l:'Biaya',k:'cost',g:'costRT'},
    {i:'⚙️',l:'Atur',k:'settings',g:'notifSet'},
  ];
  const bg = dark ? 'background:#071528;border-top-color:#1e293b;' : '';
  return `<div class="tab-bar" style="${bg}">${tabs.map(t=>{
    const on = t.k===active;
    const lc = on ? '#0ea5e9' : (dark ? '#475569' : '#94a3b8');
    return `<div class="tb${on?' on':''}" onclick="goTo('${t.g}')"><div class="tb-i">${t.i}</div><div class="tb-l" style="color:${lc}">${t.l}</div></div>`;
  }).join('')}</div>`;
}

function bars(data, w, h, hlIdx) {
  const mx = Math.max(...data, 1);
  const n = data.length;
  const bw = Math.floor(w/n)-1;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;overflow:visible">${data.map((v,i)=>{
    const bh = Math.max(Math.round((v/mx)*h),v>0?3:1);
    const x = i*(bw+1);
    const y = h-bh;
    const c = i===hlIdx ? '#f59e0b' : (v/mx>.65 ? '#0284c7' : v/mx>.3 ? '#0ea5e9' : '#bae6fd');
    const op = v===0 ? 0.2 : 1;
    return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="2" fill="${c}" opacity="${op}"/>`;
  }).join('')}</svg>`;
}

function sparkline(data, w, h, color) {
  const mx = Math.max(...data, 1);
  const step = w/(data.length-1);
  const pts = data.map((v,i)=>`${(i*step).toFixed(1)},${(h-(v/mx)*h).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block"><polyline points="${pts}" fill="none" stroke="${color||'#0ea5e9'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function minibar(pct, color) {
  return `<div style="height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:4px"><div style="height:100%;width:${pct}%;background:${color||'#0ea5e9'};border-radius:3px"></div></div>`;
}

function donut(segments) {
  // segments: [{pct, color}]
  const r=55, cx=65, cy=65, C=2*Math.PI*r;
  let offset=0;
  const arcs = segments.map(s=>{
    const len=C*(s.pct/100);
    const rest=C-len;
    const dashoffset=-(C*offset/100);
    offset+=s.pct;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="16" stroke-dasharray="${len.toFixed(1)} ${rest.toFixed(1)}" stroke-dashoffset="${dashoffset.toFixed(1)}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
  }).join('');
  return `<svg width="130" height="130" viewBox="0 0 130 130"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="16"/>${arcs}</svg>`;
}

function heatmap() {
  const rows = [
    [0,0,0,0,0,1,8,7,3,2,2,1,5,4,2,2,1,1,7,8,4,2,1,0],
    [0,0,0,0,0,2,9,8,4,3,2,2,6,5,3,2,2,1,8,7,5,2,1,0],
    [0,0,0,0,0,1,8,7,3,2,1,1,5,4,3,2,1,2,7,8,4,1,0,0],
    [0,0,0,0,0,2,7,7,4,2,2,1,4,4,3,2,1,1,8,7,4,2,1,0],
    [0,0,0,0,0,2,9,8,5,3,2,2,6,5,4,3,2,2,8,9,5,3,1,0],
    [0,0,0,0,1,2,5,6,8,8,6,4,4,3,5,6,7,7,6,5,3,2,1,0],
    [0,0,0,0,1,1,4,6,9,8,5,4,3,3,5,6,8,6,5,3,2,1,0,0],
  ];
  const colors=['#f0f9ff','#e0f2fe','#bae6fd','#7dd3fc','#38bdf8','#0ea5e9','#0284c7','#1d4ed8','#1e3a8a','#0f172a'];
  const cw=12,ch=14,gap=1;
  const tw=24*(cw+gap), th=7*(ch+gap);
  let rects='';
  rows.forEach((row,ri)=>row.forEach((v,ci)=>{
    rects+=`<rect x="${ci*(cw+gap)}" y="${ri*(ch+gap)}" width="${cw}" height="${ch}" rx="2" fill="${colors[Math.min(v,9)]}"/>`;
  }));
  return `<svg width="${tw}" height="${th}" viewBox="0 0 ${tw} ${th}" style="display:block">${rects}</svg>`;
}

const D24 = [0,0,0,0,0,2,48,35,22,18,12,5,32,28,18,12,10,0,0,0,0,0,0,0];

function roomDetail(ico, name, today, avg, sessions, weekData, backKey) {
  const wbars = bars(weekData, 310, 52);
  const days = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
  const evts = sessions.map(s=>`
    <div class="tl">
      <div class="tl-dot"></div>
      <div class="tl-time">${s.t}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600;color:#0f172a">${ico} ${name}</div><div style="font-size:11px;color:#64748b;margin-top:2px">${s.l}L · ${s.d}</div></div>
      <div class="tl-bd">${s.l}L</div>
    </div>`).join('');
  return `
    <div class="content wh" style="flex:1;overflow:auto;padding-bottom:16px">
      <button class="bk" onclick="goTo('${backKey||'roomBreak'}')">‹</button>
      <div style="margin-top:52px;display:flex;align-items:center;gap:12px">
        <div style="width:50px;height:50px;border-radius:14px;background:#e0f2fe;display:flex;align-items:center;justify-content:center;font-size:26px">${ico}</div>
        <div>
          <div style="font-size:19px;font-weight:700;color:#0f172a">${name}</div>
          <div style="font-size:12px;color:#64748b;margin-top:3px">📅 Selasa, 26 Mei 2026</div>
        </div>
      </div>
      <div class="sr" style="margin-top:14px">
        <div class="sc"><div class="sv">${today}L</div><div class="su">Hari ini</div></div>
        <div class="sc"><div class="sv">${avg}L</div><div class="su">Rata-rata</div></div>
        <div class="sc"><div class="sv">${sessions.length}x</div><div class="su">Sesi</div></div>
      </div>
      <div class="st">Pemakaian 7 Hari Terakhir</div>
      <div class="cw">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">${days.map(d=>`<div style="font-size:10px;color:#94a3b8;text-align:center;flex:1">${d}</div>`).join('')}</div>
        ${wbars}
        <div style="display:flex;justify-content:space-between;margin-top:5px">${weekData.map(v=>`<div style="font-size:10px;color:#0f172a;font-weight:600;text-align:center;flex:1">${v||'–'}</div>`).join('')}</div>
      </div>
      <div class="st">Riwayat Hari Ini</div>
      ${evts}
      <div style="height:20px"></div>
    </div>`;
}

/* ─── screens ─── */
function renderScreen(key) {
  switch(key) {

  /* ══ 1. MONITORING — AIR MENGALIR ══ */
  case 'mon1': return `${SBD}
    <div class="content dk" style="flex:1;overflow:auto;padding-bottom:0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <div>
          <div style="font-size:12px;color:rgba(255,255,255,.55)">Selasa, 26 Mei 2026</div>
          <div style="font-size:17px;font-weight:700;color:#fff;margin-top:2px">Selamat siang, Nurhady 👋</div>
        </div>
        <div style="width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer">🔔</div>
      </div>

      <!-- FLOW CIRCLE -->
      <div style="text-align:center;margin:18px 0 10px">
        <div style="position:relative;width:190px;height:190px;margin:0 auto">
          <svg width="190" height="190" viewBox="0 0 190 190" style="position:absolute;inset:0">

/* ─── navigation ─── */
let current = 0;
function render() {
  const s = SCREENS[current];
  document.getElementById('screen16').innerHTML = renderScreen(s.key);
  document.getElementById('screen17').innerHTML = renderScreen(s.key);
  document.getElementById('screenPill').textContent = `Screen ${current+1} / ${SCREENS.length} — ${s.name}`;
  document.querySelectorAll('.nav-item').forEach((el,i) => el.classList.toggle('active', i===current));
}
function next(){ if(current<SCREENS.length-1){current++;render();} }
function prev(){ if(current>0){current--;render();} }
function goTo(key){ const i=SCREENS.findIndex(x=>x.key===key); if(i>=0){current=i;render();} }

document.getElementById('nextBtn').onclick = next;
document.getElementById('prevBtn').onclick = prev;
document.addEventListener('keydown', e=>{ if(e.key==='ArrowRight') next(); if(e.key==='ArrowLeft') prev(); });

const nav = document.getElementById('navList');
SCREENS.forEach((s,i)=>{
  const el = document.createElement('div');
  el.className = 'nav-item';
  el.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span><span>${s.name}</span>`;
  el.onclick = ()=>{current=i;render();};
  nav.appendChild(el);
});

render();
</script>
