<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AquaTrack — Figma Prototype (iPhone 16 & 17)</title>
<style>
  :root{
    --bg:#0b1220; --panel:#0f172a; --ink:#e2e8f0; --muted:#94a3b8;
    --blue:#0ea5e9; --blue2:#0284c7; --teal:#14b8a6; --aqua:#22d3ee;
    --green:#10b981; --red:#ef4444; --amber:#f59e0b;
    --card:#ffffff; --soft:#f1f5f9; --line:#e2e8f0; --text:#0f172a;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,Roboto,sans-serif}
  html,body{margin:0;background:radial-gradient(1200px 800px at 20% 0%,#1e293b,#0b1220 60%);color:var(--ink);min-height:100vh}
  header.topbar{
    position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);
    background:rgba(11,18,32,.75);border-bottom:1px solid #1e293b;
    padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap
  }
  header h1{margin:0;font-size:16px;letter-spacing:.3px}
  header .pill{font-size:12px;color:var(--muted);padding:4px 10px;border:1px solid #1e293b;border-radius:999px}
  header .spacer{flex:1}
  header select,header button{
    background:#111827;color:var(--ink);border:1px solid #1e293b;border-radius:10px;
    padding:8px 12px;font-size:13px;cursor:pointer
  }
  header button.primary{background:linear-gradient(135deg,var(--blue),var(--teal));border:none;color:#fff;font-weight:600}

  .workspace{padding:24px;display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:start}
  aside.sidebar{
    position:sticky;top:74px;background:var(--panel);border:1px solid #1e293b;border-radius:14px;
    padding:14px;max-height:calc(100vh - 100px);overflow:auto
  }
  aside h3{margin:4px 0 10px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  aside .nav-item{
    display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;
    font-size:13px;color:#cbd5e1;margin-bottom:2px
  }
  aside .nav-item:hover{background:#111827}
  aside .nav-item.active{background:linear-gradient(135deg,rgba(14,165,233,.18),rgba(20,184,166,.18));color:#fff}
  aside .num{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;font-size:11px;border-radius:6px;background:#1e293b;color:var(--muted)}

  main.canvas{display:flex;flex-direction:column;gap:32px}
  .frame-row{display:flex;gap:48px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
  .frame-label{font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px}

  /* iPhone frames */
  .iphone{
    position:relative;width:390px;height:844px;border-radius:54px;
    background:#000;padding:14px;
    box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 2px #1f2937,0 0 0 4px #0a0f1c;
  }
  .iphone.ip17{
    width:402px;height:874px;border-radius:58px;
    box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 2px #334155,0 0 0 4px #0a0f1c;
  }
  .island{
    position:absolute;top:18px;left:50%;transform:translateX(-50%);
    width:120px;height:34px;background:#000;border-radius:20px;z-index:5
  }
  .ip17 .island{width:96px;height:30px;top:20px;border-radius:18px}
  .screen{
    width:100%;height:100%;border-radius:42px;overflow:hidden;background:var(--card);
    color:var(--text);position:relative;display:flex;flex-direction:column
  }
  .ip17 .screen{border-radius:46px}
  .statusbar{
    height:54px;flex:0 0 54px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 8px;font-size:13px;font-weight:600;color:#0f172a
  }
  .statusbar .icons{display:flex;gap:5px;align-items:center}
  .statusbar svg{width:16px;height:11px}

  .content{flex:1;overflow:auto;padding:8px 22px 22px}
  .content.dark{background:linear-gradient(160deg,#0ea5e9,#0284c7 55%,#075985);color:#fff}
  .content.aqua{background:linear-gradient(160deg,#22d3ee 0%,#0ea5e9 60%,#0369a1)}
  .content.teal{background:linear-gradient(160deg,#14b8a6,#0d9488 60%,#115e59)}
  .content.green{background:linear-gradient(160deg,#34d399,#10b981 60%,#065f46)}
  .content.soft{background:#f8fafc}

  .home-indicator{
    position:absolute;left:50%;transform:translateX(-50%);bottom:8px;
    width:134px;height:5px;border-radius:3px;background:rgba(15,23,42,.45)
  }
  .content.dark + .home-indicator,
  .content.aqua + .home-indicator,
  .content.teal + .home-indicator,
  .content.green + .home-indicator{background:rgba(255,255,255,.6)}

  /* UI components */
  h2.title{font-size:26px;margin:18px 0 8px;line-height:1.2}
  p.sub{font-size:14px;color:var(--muted);line-height:1.45;margin:0 0 18px}
  .dark p.sub,.aqua p.sub,.teal p.sub,.green p.sub{color:rgba(255,255,255,.85)}
  .dark h2.title,.aqua h2.title,.teal h2.title,.green h2.title{color:#fff}

  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;padding:14px;border-radius:14px;font-weight:600;font-size:15px;
    cursor:pointer;border:none;margin-top:10px;transition:transform .1s
  }
  .btn:active{transform:scale(.98)}
  .btn-primary{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff}
  .btn-white{background:#fff;color:#0c4a6e;border:1px solid #e0f2fe}
  .btn-dark{background:#0f172a;color:#fff}
  .btn-ghost{background:transparent;color:#0284c7;border:1px solid #bae6fd}
  .btn-google{background:#fff;color:#0f172a;border:1px solid #e2e8f0}
  .btn-apple{background:#0f172a;color:#fff}

  .input{
    width:100%;padding:14px;border-radius:12px;border:1px solid #e2e8f0;
    font-size:14px;background:#fff;margin-bottom:10px;outline:none
  }
  .input:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.15)}
  label.lbl{display:block;font-size:12px;color:#475569;margin:8px 0 6px;font-weight:500}

  .dots{display:flex;gap:6px;justify-content:center;margin-top:14px}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35)}
  .dot.on{width:24px;border-radius:5px;background:#fff}

  .hero{
    width:100%;aspect-ratio:1/1;border-radius:24px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.12);backdrop-filter:blur(8px);margin-top:20px;font-size:96px
  }
  .hero.soft{background:#e0f2fe;color:#0284c7}

  .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:12px}
  .row .ico{width:42px;height:42px;border-radius:12px;background:#e0f2fe;display:flex;align-items:center;justify-content:center;color:#0284c7;font-size:20px;flex-shrink:0}
  .row .grow{flex:1;min-width:0}
  .row .grow h4{margin:0;font-size:14px;color:#0f172a}
  .row .grow p{margin:2px 0 0;font-size:12px;color:#64748b;line-height:1.35}

  .otp{display:flex;gap:10px;justify-content:center;margin:22px 0}
  .otp input{
    width:48px;height:58px;border-radius:12px;border:1px solid #e2e8f0;text-align:center;
    font-size:22px;font-weight:700;color:#0f172a;outline:none;background:#fff
  }
  .otp input:focus{border-color:#0ea5e9}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 14px}
  .chip{padding:10px 14px;border-radius:999px;border:1px solid #e2e8f0;font-size:13px;cursor:pointer;background:#fff;color:#0f172a}
  .chip.on{background:#0ea5e9;color:#fff;border-color:#0ea5e9}

  .stepper{display:flex;align-items:center;justify-content:space-between;background:#f1f5f9;border-radius:14px;padding:8px;margin:6px 0 14px}
  .stepper button{width:38px;height:38px;border-radius:10px;border:none;background:#fff;font-size:18px;font-weight:700;color:#0284c7;cursor:pointer}
  .stepper .val{font-size:22px;font-weight:700;color:#0f172a}

  .progress{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin:8px 0 14px}
  .progress > span{display:block;height:100%;background:linear-gradient(90deg,#0ea5e9,#14b8a6);border-radius:3px}

  .success-icon{
    width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;margin:30px auto 20px;font-size:60px;color:#fff;
    border:3px solid rgba(255,255,255,.3)
  }

  .qr{
    width:200px;height:200px;background:
      conic-gradient(#000 25%,#fff 0 50%,#000 0 75%,#fff 0),
      repeating-linear-gradient(90deg,#000 0 6px,#fff 0 12px),
      repeating-linear-gradient(0deg,#000 0 6px,#fff 0 12px);
    background-size:100% 100%,100% 100%,100% 100%;background-blend-mode:difference;
    border:8px solid #fff;border-radius:16px;margin:18px auto;position:relative
  }
  .qr::before,.qr::after{content:"";position:absolute;width:50px;height:50px;border:8px solid #000;background:#fff}
  .qr::before{top:-2px;left:-2px}
  .qr::after{bottom:-2px;right:-2px}

  .scan-frame{
    width:240px;height:240px;border-radius:24px;margin:30px auto;position:relative;
    background:rgba(0,0,0,.35);border:2px dashed rgba(255,255,255,.5)
  }
  .scan-frame::before,.scan-frame::after,.scan-frame > i,.scan-frame > b{
    content:"";position:absolute;width:32px;height:32px;border:3px solid #22d3ee
  }
  .scan-frame::before{top:-2px;left:-2px;border-right:none;border-bottom:none;border-radius:12px 0 0 0}
  .scan-frame::after{top:-2px;right:-2px;border-left:none;border-bottom:none;border-radius:0 12px 0 0}
  .scan-frame > i{bottom:-2px;left:-2px;border-right:none;border-top:none;border-radius:0 0 0 12px}
  .scan-frame > b{bottom:-2px;right:-2px;border-left:none;border-top:none;border-radius:0 0 12px 0}
  .scan-line{position:absolute;left:8px;right:8px;top:50%;height:2px;background:#22d3ee;box-shadow:0 0 12px #22d3ee;animation:scan 2s linear infinite}
  @keyframes scan{0%{top:8px}50%{top:calc(100% - 8px)}100%{top:8px}}

  .slider-wrap{margin:18px 0}
  .slider-wrap input[type=range]{width:100%;accent-color:#fff}
  .target-circle{
    width:200px;height:200px;border-radius:50%;margin:24px auto 12px;
    background:conic-gradient(#fff var(--p,60%),rgba(255,255,255,.2) 0);
    display:flex;align-items:center;justify-content:center;position:relative
  }
  .target-circle::before{content:"";position:absolute;inset:14px;border-radius:50%;background:linear-gradient(160deg,#0ea5e9,#0284c7)}
  .target-circle span{position:relative;color:#fff;font-size:36px;font-weight:700}
  .target-circle small{position:relative;color:rgba(255,255,255,.85);font-size:12px;display:block;text-align:center;margin-top:-4px}

  .footer-link{text-align:center;font-size:13px;color:#64748b;margin-top:12px}
  .footer-link a{color:#0284c7;text-decoration:none;font-weight:600;cursor:pointer}

  .perm-illus{
    width:160px;height:160px;margin:20px auto;border-radius:40px;
    background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;
    font-size:80px;color:#fff;border:2px solid rgba(255,255,255,.3)
  }

  .skip{position:absolute;top:60px;right:24px;font-size:13px;color:#0284c7;cursor:pointer;font-weight:600;z-index:6;background:none;border:none}
  .dark .skip,.aqua .skip,.teal .skip,.green .skip{color:rgba(255,255,255,.9)}

  .back{position:absolute;top:60px;left:24px;width:36px;height:36px;border-radius:12px;background:rgba(15,23,42,.06);border:none;color:#0f172a;font-size:18px;cursor:pointer;z-index:6;display:flex;align-items:center;justify-content:center}
  .dark .back,.aqua .back,.teal .back,.green .back{background:rgba(255,255,255,.18);color:#fff}

  .toggle{width:48px;height:28px;border-radius:14px;background:#cbd5e1;position:relative;cursor:pointer;flex-shrink:0;transition:.2s}
  .toggle.on{background:#0ea5e9}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on::after{left:23px}

  @media (max-width:1100px){
    .workspace{grid-template-columns:1fr}
    aside.sidebar{position:static;max-height:none}
  }
</style>
</head>
<body>

<header class="topbar">
  <h1>💧 AquaTrack — Interactive Figma Prototype</h1>
  <span class="pill" id="screenPill">Screen 1 / 24</span>
  <div class="spacer"></div>
  <button id="prevBtn">← Prev</button>
  <button id="nextBtn" class="primary">Next →</button>
</header>

<div class="workspace">
  <aside class="sidebar">
    <h3>Frames (24)</h3>
    <div id="navList"></div>
  </aside>

  <main class="canvas">
    <div class="frame-row">
      <div>
        <div class="frame-label">iPhone 16 — 390 × 844</div>
        <div class="iphone ip16">
          <div class="island"></div>
          <div id="screen16" class="screen"></div>
          <div class="home-indicator"></div>
        </div>
      </div>
      <div>
        <div class="frame-label">iPhone 17 — 402 × 874</div>
        <div class="iphone ip17">
          <div class="island"></div>
          <div id="screen17" class="screen"></div>
          <div class="home-indicator"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const SCREENS = [
  {key:'w1', name:'Welcome 1 — Pantau Air', theme:'aqua'},
  {key:'w2', name:'Welcome 2 — Deteksi Bocor', theme:'dark'},
  {key:'w3', name:'Welcome 3 — Hemat Biaya', theme:'teal'},
  {key:'w4', name:'Welcome 4 — Selamatkan Bumi', theme:'green'},
  {key:'auth', name:'Pilih Daftar / Masuk', theme:'soft'},
  {key:'regEmail', name:'Daftar — Email', theme:'soft'},
  {key:'regGoogle', name:'Daftar — Google', theme:'soft'},
  {key:'regApple', name:'Daftar — Apple', theme:'soft'},
  {key:'login', name:'Masuk', theme:'soft'},
  {key:'forgot', name:'Lupa Password', theme:'soft'},
  {key:'reset', name:'Reset Password', theme:'soft'},
  {key:'otp', name:'Verifikasi OTP', theme:'soft'},
  {key:'verified', name:'Berhasil Verifikasi', theme:'green'},
  {key:'permNotif', name:'Izin Notifikasi', theme:'aqua'},
  {key:'permLoc', name:'Izin Lokasi', theme:'aqua'},
  {key:'permBt', name:'Izin Bluetooth', theme:'aqua'},
  {key:'setName', name:'Setup Nama Pengguna', theme:'soft'},
  {key:'setOcc', name:'Setup Jumlah Penghuni', theme:'soft'},
  {key:'setType', name:'Setup Jenis Hunian', theme:'soft'},
  {key:'setArea', name:'Setup Luas Hunian', theme:'soft'},
  {key:'setTarif', name:'Setup Tarif Air', theme:'soft'},
  {key:'pairScan', name:'Pairing Sensor (QR)', theme:'dark'},
  {key:'pairOk', name:'Pairing Berhasil', theme:'green'},
  {key:'setTarget', name:'Set Target Hemat Air', theme:'teal'},
];

const StatusBar = `
  <div class="statusbar">
    <span>9:41</span>
    <div class="icons">
      <span>•••</span>
      <svg viewBox="0 0 20 12" fill="currentColor"><rect x="0" y="3" width="3" height="6" rx="1"/><rect x="5" y="1" width="3" height="10" rx="1"/></svg>
      <svg viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="20" height="10" rx="2.5"/><rect x="3" y="3" width="14" height="6" rx="1" fill="currentColor"/></svg>
    </div>
  </div>`;

const Dots = (i) => `<div class="dots">${[0,1,2,3].map(n=>`<div class="dot ${n===i?'on':''}"></div>`).join('')}</div>`;

function renderScreen(key){
  const s = SCREENS.find(x=>x.key===key);
  let inner = '';
  switch(key){
    case 'w1':
      inner = `<button class="skip" onclick="goTo('auth')">Lewati</button>
        <div class="hero">💧</div>
        <h2 class="title">Pantau penggunaan air realtime</h2>
        <p class="sub">Lihat konsumsi air rumah Anda secara langsung dari smartphone, kapan saja dan di mana saja.</p>
        ${Dots(0)}
        <button class="btn btn-white" onclick="next()">Lanjut</button>`;
      break;
    case 'w2':
      inner = `<button class="skip" onclick="goTo('auth')">Lewati</button>
        <div class="hero">🚨</div>
        <h2 class="title">Deteksi kebocoran lebih dini</h2>
        <p class="sub">Sensor pintar akan memberi tahu Anda saat terjadi anomali aliran air sebelum kerugian membesar.</p>
        ${Dots(1)}
        <button class="btn btn-white" onclick="next()">Lanjut</button>`;
      break;
    case 'w3':
      inner = `<button class="skip" onclick="goTo('auth')">Lewati</button>
        <div class="hero">💰</div>
        <h2 class="title">Hemat biaya tagihan bulanan</h2>
        <p class="sub">Pantau pola pemakaian dan dapatkan rekomendasi cerdas untuk menurunkan tagihan air Anda.</p>
        ${Dots(2)}
        <button class="btn btn-white" onclick="next()">Lanjut</button>`;
      break;
    case 'w4':
      inner = `<button class="skip" onclick="goTo('auth')">Lewati</button>
        <div class="hero">🌍</div>
        <h2 class="title">Bersama selamatkan bumi</h2>
        <p class="sub">Setiap tetes berarti. Kontribusi Anda dalam menghemat air membantu menjaga planet kita.</p>
        ${Dots(3)}
        <button class="btn btn-white" onclick="next()">Mulai</button>`;
      break;
    case 'auth':
      inner = `<div style="text-align:center;margin-top:40px">
          <div style="font-size:64px">💧</div>
          <h2 class="title" style="text-align:center">Selamat datang di AquaTrack</h2>
          <p class="sub" style="text-align:center">Kelola air rumah Anda dengan lebih cerdas</p>
        </div>
        <div style="margin-top:30px">
          <button class="btn btn-primary" onclick="goTo('regEmail')">📧 Daftar dengan Email</button>
          <button class="btn btn-google" onclick="goTo('regGoogle')">🔵 Daftar dengan Google</button>
          <button class="btn btn-apple" onclick="goTo('regApple')">🍎 Daftar dengan Apple</button>
          <p class="footer-link">Sudah punya akun? <a onclick="goTo('login')">Masuk</a></p>
        </div>`;
      break;
    case 'regEmail':
      inner = `<button class="back" onclick="goTo('auth')">‹</button>
        <h2 class="title" style="margin-top:50px">Buat akun baru</h2>
        <p class="sub">Daftar untuk mulai menghemat air</p>
        <label class="lbl">Nama lengkap</label>
        <input class="input" placeholder="Nama Anda" />
        <label class="lbl">Email</label>
        <input class="input" type="email" placeholder="email@contoh.com" />
        <label class="lbl">Password</label>
        <input class="input" type="password" placeholder="Min. 8 karakter" />
        <button class="btn btn-primary" onclick="goTo('otp')">Daftar</button>
        <p class="footer-link">Sudah punya akun? <a onclick="goTo('login')">Masuk</a></p>`;
      break;
    case 'regGoogle':
      inner = `<button class="back" onclick="goTo('auth')">‹</button>
        <div style="text-align:center;margin-top:60px">
          <div style="font-size:64px">🔵</div>
          <h2 class="title" style="text-align:center">Daftar dengan Google</h2>
          <p class="sub" style="text-align:center">Pilih akun Google yang ingin Anda gunakan</p>
        </div>
        <div class="card" onclick="goTo('permNotif')" style="cursor:pointer">
          <div class="row"><div class="ico">A</div><div class="grow"><h4>andi@gmail.com</h4><p>Akun pribadi</p></div><span style="color:#94a3b8">›</span></div>
        </div>
        <div class="card" onclick="goTo('permNotif')" style="cursor:pointer">
          <div class="row"><div class="ico" style="background:#fef3c7;color:#d97706">B</div><div class="grow"><h4>budi.kerja@gmail.com</h4><p>Akun kerja</p></div><span style="color:#94a3b8">›</span></div>
        </div>
        <button class="btn btn-ghost">+ Tambah akun lain</button>`;
      break;
    case 'regApple':
      inner = `<button class="back" onclick="goTo('auth')">‹</button>
        <div style="text-align:center;margin-top:60px">
          <div style="font-size:64px">🍎</div>
          <h2 class="title" style="text-align:center">Daftar dengan Apple</h2>
          <p class="sub" style="text-align:center">Gunakan Apple ID untuk daftar dengan cepat dan aman</p>
        </div>
        <div class="card">
          <div class="row"><div class="ico" style="background:#0f172a;color:#fff">🍎</div><div class="grow"><h4>nurhady@icloud.com</h4><p>Apple ID terhubung</p></div></div>
        </div>
        <div class="card">
          <div class="row" style="justify-content:space-between">
            <div><h4 style="margin:0;font-size:14px">Sembunyikan email saya</h4><p style="margin:2px 0 0;font-size:12px;color:#64748b">Buat email anonim</p></div>
            <div class="toggle on"></div>
          </div>
        </div>
        <button class="btn btn-apple" onclick="goTo('permNotif')">🍎 Lanjut dengan Apple</button>`;
      break;
    case 'login':
      inner = `<button class="back" onclick="goTo('auth')">‹</button>
        <h2 class="title" style="margin-top:50px">Masuk ke akun</h2>
        <p class="sub">Selamat datang kembali 👋</p>
        <label class="lbl">Email</label>
        <input class="input" placeholder="email@contoh.com" />

      inner = `<button class="skip" onclick="goTo('setName')">Nanti saja</button>

          <button class="btn btn-white" onclick="goTo('setName')">Izinkan Bluetooth</button>

        </div>`;
      break;
    case 'setName':
      inner = `<button class="back" onclick="prev()">‹</button>
        <div class="progress" style="margin-top:60px"><span style="width:20%"></span></div>
        <p style="font-size:12px;color:#64748b;margin:0 0 10px">Langkah 1 dari 5</p>
        <h2 class="title">Siapa nama Anda?</h2>
        <p class="sub">Kami akan menyapa Anda dengan nama ini.</p>

      break;
    case 'setOcc':
      inner = `<button class="back" onclick="prev()">‹</button>
        <div class="progress" style="margin-top:60px"><span style="width:40%"></span></div>
        <p style="font-size:12px;color:#64748b;margin:0 0 10px">Langkah 2 dari 5</p>

        <p class="sub">Membantu menghitung target konsumsi yang ideal.</p>
        <div class="stepper">
          <button>−</button>
          <div><div class="val">4</div><div style="font-size:11px;color:#64748b;text-align:center">orang</div></div>

        <div class="chip-row">
          <div class="chip">1</div><div class="chip">2</div><div class="chip">3</div>

      inner = `<button class="back" onclick="prev()">‹</button>

        <p style="font-size:12px;color:#64748b;margin:0 0 10px">Langkah 3 dari 5</p>
        <h2 class="title">Jenis hunian Anda?</h2>
        <p class="sub">Pilih yang paling sesuai.</p>
        <div class="card"><div class="row"><div class="ico">🏠</div><div class="grow"><h4>Rumah tapak</h4><p>Hunian satu/dua lantai</p></div><div class="toggle on"></div></div></div>
        <div class="card"><div class="row"><div class="ico">🏢</div><div class="grow"><h4>Apartemen</h4><p>Unit dalam gedung tinggi</p></div><div class="toggle"></div></div></div>
        <div class="card"><div class="row"><div class="ico">🏘️</div><div class="grow"><h4>Townhouse / Cluster</h4><p>Hunian cluster</p></div><div class="toggle"></div></div></div>
        <div class="card"><div class="row"><div class="ico">🏬</div><div class="grow"><h4>Kos / Kontrakan</h4><p>Hunian sewa</p></div><div class="toggle"></div></div></div>
        <button class="btn btn-primary" onclick="goTo('setArea')">Lanjut</button>`;
      break;
    case 'setArea':
      inner = `<button class="back" onclick="prev()">‹</button>
        <div class="progress" style="margin-top:60px"><span style="width:80%"></span></div>
        <p style="font-size:12px;color:#64748b;margin:0 0 10px">Langkah 4 dari 5</p>
        <h2 class="title">Luas hunian Anda?</h2>
        <p class="sub">Geser untuk memilih estimasi luas total.</p>
        <div style="background:#f1f5f9;border-radius:16px;padding:24px;text-align:center;margin:10px 0">
          <div style="font-size:48px;font-weight:700;color:#0284c7">120<span style="font-size:20px;color:#64748b"> m²</span></div>
        </div>
        <div class="slider-wrap"><input type="range" min="20" max="500" value="120" style="accent-color:#0ea5e9"/></div>
        <div class="chip-row">
          <div class="chip">&lt;50 m²</div><div class="chip">50–100</div>
          <div class="chip on">100–150</div><div class="chip">150–250</div><div class="chip">250+</div>
        </div>
        <button class="btn btn-primary" onclick="goTo('setTarif')">Lanjut</button>`;
      break;
    case 'setTarif':
      inner = `<button class="back" onclick="prev()">‹</button>
        <div class="progress" style="margin-top:60px"><span style="width:100%"></span></div>
        <p style="font-size:12px;color:#64748b;margin:0 0 10px">Langkah 5 dari 5</p>
        <h2 class="title">Tarif air daerah</h2>

          <div class="row"><div class="ico">📍</div><div class="grow"><h4>PAM Jaya — Jakarta</h4><p>Otomatis dari lokasi</p></div></div>

      break;
    case 'pairScan':

        <button class="skip" onclick="goTo('pairOk')">Lewati</button>
        <h2 class="title" style="margin-top:50px">Pasangkan sensor</h2>

        <div class="scan-frame"><i></i><b></b><div class="scan-line"></div></div>
        <p style="text-align:center;color:rgba(255,255,255,.8);font-size:13px;margin:10px 0">Pastikan kode QR berada di dalam bingkai</p>

    case 'pairOk':

            <div class="ico" style="background:#dcfce7;color:#16a34a">📡</div>

        </div>

      break;
    case 'setTarget':
      inner = `<button class="back" onclick="prev()">‹</button>
        <h2 class="title" style="margin-top:50px">Target hemat air</h2>
        <p class="sub">Tentukan berapa persen ingin Anda hemat dibanding bulan lalu.</p>
        <div class="target-circle" style="--p:60%"><span>15%</span></div>
        <p style="text-align:center;color:rgba(255,255,255,.9);font-size:13px;margin:0 0 8px">Hemat ~ <b>Rp 35.000</b> per bulan</p>
        <div class="slider-wrap"><input type="range" min="5" max="40" value="15"/></div>
        <div class="chip-row" style="justify-content:center">
          <div class="chip" style="background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff">5%</div>
          <div class="chip" style="background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff">10%</div>
          <div class="chip on" style="background:#fff;color:#0d9488;border-color:#fff">15%</div>
          <div class="chip" style="background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff">25%</div>
        </div>
        <button class="btn btn-white" onclick="alert('🎉 Onboarding selesai! Selamat datang di AquaTrack.')">Mulai Hemat Air</button>`;

    default:
      inner = `<h2 class="title">${s.name}</h2><p class="sub">Layar belum dirancang.</p>`;
  }
  return `${StatusBar}<div class="content ${s.theme}">${inner}</div>`;
}

let current = 0;
function render(){
  const s = SCREENS[current];
  document.getElementById('screen16').innerHTML = renderScreen(s.key);
  document.getElementById('screen17').innerHTML = renderScreen(s.key);
  document.getElementById('screenPill').textContent = `Screen ${current+1} / ${SCREENS.length} — ${s.name}`;
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
  });
}
function next(){ if(current<SCREENS.length-1){current++;render();} }
function prev(){ if(current>0){current--;render();} }
function goTo(key){ const i=SCREENS.findIndex(x=>x.key===key); if(i>=0){current=i;render();} }

document.getElementById('nextBtn').onclick = next;
document.getElementById('prevBtn').onclick = prev;
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') next();
  if(e.key==='ArrowLeft') prev();
});

const nav = document.getElementById('navList');
SCREENS.forEach((s,i)=>{
  const el = document.createElement('div');
  el.className = 'nav-item';
  el.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span><span>${s.name}</span>`;
  el.onclick = ()=>{current=i;render();};
  nav.appendChild(el);
});

render();
</script>
